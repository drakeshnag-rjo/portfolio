name: Bump years of experience

on:
  schedule:
    # August 1st, 06:23 UTC — experience rolls over each August
    - cron: "23 6 1 8 *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Recompute years of experience
        run: python3 scripts/update_experience.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md
          git commit -m "chore: annual years-of-experience rollover"
          git pull --rebase origin main
          git push
