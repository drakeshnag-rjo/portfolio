name: Update publications from Google Scholar

on:
  schedule:
    # Mondays 06:17 UTC (odd minute to avoid the top-of-hour rush)
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scholarly
        run: pip install --quiet scholarly free-proxy "httpx<0.28"

      - name: Refresh data/publications.json
        run: python scripts/update_scholar.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet data/publications.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git commit -m "chore: sync publications from Google Scholar"
          # the fetch can take ~30 min; rebase in case main moved meanwhile
          git pull --rebase origin main
          git push
